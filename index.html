<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak Greeting</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1a472a, #2d5a27);
            color: white;
            font-family: 'Arial', sans-serif;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 90%;
        }
        h1 {
            color: #ffd700;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
        }
        .moon {
            font-size: 50px;
            margin-bottom: 20px;
        }
        .footer {
            margin-top: 20px;
            font-weight: bold;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="moon">🌙✨</div>
        <h1>Eid Mubarak!</h1>
        <p>May this special day bring peace, happiness, and prosperity to everyone.</p>
        <div class="footer">The Hura Enterprises ki taraf se Mubarakbaad</div>
    </div>
</body>
</html>
