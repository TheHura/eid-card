<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak</title>
    <style>
        /* Force Green Background */
        html, body { background-color: #004b23 !important; margin: 0; padding: 0; color: #fff; text-align: center; font-family: sans-serif; }
        .container { padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #004b23; }
        .from-name { background: gold; color: #000; padding: 10px 25px; border-radius: 50px; font-weight: bold; font-size: 26px; box-shadow: 0 0 15px gold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        h1 { font-size: 45px; color: #ff0; text-shadow: 2px 2px #000; margin: 15px 0; }
        .moon { font-size: 70px; margin: 10px 0; }
        .input-area { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; width: 85%; max-width: 350px; margin-top: 20px; border: 1px solid gold; }
        input { width: 80%; padding: 12px; border-radius: 5px; border: none; font-size: 18px; margin-bottom: 15px; }
        .share-btn { background: #25D366; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 50px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="from-name" id="displayName">Ali</div>
        <p style="font-size: 20px; font-weight: bold;">ki taraf se aapke pure parivaar ko</p>
        <div class="moon">🌙</div>
        <h1>EID MUBARAK</h1>
        <div class="input-area">
            <input type="text" id="nameInput" placeholder="Apna Naam Likhein...">
            <button class="share-btn" onclick="go()">WhatsApp par Bhejein 🟢</button>
        </div>
    </div>
    <script>
        var mySmartlink = "https://www.effectivegatecpm.com/em2yha4k6?key=a98ee7e120ee6fda276897a4f63cbf75";
        
        window.onload = function() {
            const n = new URLSearchParams(window.location.search).get('n');
            if (n) document.getElementById("displayName").innerText = decodeURIComponent(n);
        }; 

        function go() {
            var name = document.getElementById("nameInput").value;
            if(!name) { alert("Naam likhein!"); return; }
            window.open(mySmartlink, '_blank');
            var link = window.location.origin + window.location.pathname + "?n=" + encodeURIComponent(name);
            var msg = encodeURIComponent("🌙 *देखिये " + name + " ने आपके लिए कुछ भेजा है!* 👇\n" + link);
            setTimeout(function() { window.location.href = "https://api.whatsapp.com/send?text=" + msg; }, 400);
        }
    </script>
</body>
</html>
