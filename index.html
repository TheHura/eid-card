<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak Special Wish</title>
    <style>
        body { margin: 0; padding: 0; background: #004b23; font-family: 'Arial', sans-serif; text-align: center; color: #fff; }
        .container { padding: 10px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .from-name { background: gold; color: #000; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 26px; margin-bottom: 10px; box-shadow: 0 0 15px gold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        h1 { font-size: 45px; color: #ff0; text-shadow: 2px 2px #000; margin: 5px 0; }
        .moon { font-size: 60px; margin: 10px 0; }
        .family-wish { font-size: 20px; font-weight: bold; color: #fff; }
        
        /* Direct Link Button Style */
        .ad-btn { background: #ff4757; color: white; border: none; padding: 12px 20px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; text-decoration: none; display: inline-block; margin: 15px 0; box-shadow: 0 4px 10px rgba(0,0,0,0.3); animation: shake 0.5s infinite; }
        @keyframes shake { 0% { transform: rotate(0deg); } 25% { transform: rotate(2deg); } 50% { transform: rotate(0deg); } 75% { transform: rotate(-2deg); } 100% { transform: rotate(0deg); } }

        /* Banner Ad Container */
        .banner-ad { margin: 15px 0; width: 100%; min-height: 50px; background: rgba(255,255,255,0.05); }

        .input-area { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; margin-top: 20px; }
        input { width: 80%; padding: 12px; border-radius: 5px; border: none; font-size: 18px; margin-bottom: 15px; color: #000; }
        .share-btn { background: #25D366; color: white; border: none; padding: 15px 25px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; text-decoration: none; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="container">
        <div class="banner-ad">
            </div>

        <div class="from-name" id="displayName">Ali</div>
        <div class="family-wish">ki taraf se aapke pure parivaar ko</div>
        <div class="moon">🌙</div>
        <h1>EID MUBARAK</h1>

        <a href="https://www.effectivegatecpm.com/em2yha4k6?key=a98ee7e120ee6fda276897a4f63cbf75" target="_blank" class="ad-btn">
            🎁 Eid Surprise Dekhein 🎁
        </a>
        
        <div class="input-area">
            <input type="text" id="nameInput" placeholder="Apna Naam Likhein...">
            <br>
            <button class="share-btn" onclick="shareOnWhatsApp()">WhatsApp par Bhejein 🟢</button>
        </div>

        <div class="banner-ad">
            </div>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const senderName = urlParams.get('n');
            if (senderName) {
                document.getElementById("displayName").innerHTML = decodeURIComponent(senderName);
            }
        };

        function shareOnWhatsApp() {
            var name = document.getElementById("nameInput").value;
            if(name == "") { alert("Pehle apna naam likhein!"); return; }
            var shareLink = window.location.origin + window.location.pathname + "?n=" + encodeURIComponent(name);
            var msg = encodeURIComponent("🌙 *देखिये " + name + " ने आपके पूरे परिवार के लिए कुछ भेजा है!* 🌙\n\nइसे देखने के लिए नीचे दी गई लाइन पर क्लिक करें 👇\n\n" + shareLink);
            window.open("https://api.whatsapp.com/send?text=" + msg);
        }
    </script>
</body>
</html>
